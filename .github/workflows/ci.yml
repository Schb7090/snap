name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Verify (lint · typecheck · test · doctor)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        run: npm run lint -- --max-warnings 0

      - name: TypeScript check
        run: npm run typecheck

      - name: Jest
        run: npm test -- --ci --reporters=default

      - name: Expo Doctor
        run: npx expo-doctor

  bundle:
    name: Bundle (Android export)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Export Android bundle
        run: npx expo export --platform android --output-dir dist
        env:
          EXPO_NO_TELEMETRY: 1

      - name: Bundle size summary
        run: |
          echo "Bundle artifacts:"
          find dist -type f -name "*.hbc" -exec ls -lh {} \;
          echo ""
          echo "Total dist size:"
          du -sh dist
